<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seed - Checkout</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#fff}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .card{border:1px solid rgba(255,255,255,0.10);border-radius:16px;background:rgba(255,255,255,0.04);padding:14px}
    h1{font-size:16px;margin:0 0 10px;font-weight:900}
    p{margin:0 0 12px;color:rgba(255,255,255,0.74);line-height:1.6;font-weight:600;font-size:13px}
    .row{display:flex;flex-wrap:wrap;gap:10px}
    button,a{height:40px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:#fff;font-weight:900;padding:0 12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px}
    button:hover,a:hover{background:rgba(255,255,255,0.10)}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:rgba(255,255,255,0.86)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Seed do checkout</h1>
      <p>Cria dados em <code>localStorage</code> para abrir o checkout com estado consistente.</p>
      <div class="row">
        <button id="seedBtn" type="button">Aplicar seed</button>
        <a href="../checkout-public.html?ck=ck_visual" target="_blank" rel="noopener">Abrir checkout</a>
      </div>
    </div>
  </div>

  <script>
    const seed = () => {
      const d = {
        name: 'CLICKIFY',
        desc: 'Descrição',
        productImage: '',
        checkouts: [{
          id: 'ck_visual',
          name: 'Checkout Principal',
          isDefault: true,
          price: 1122.23,
          payment: {
            credit: { enabled: true, fee: 0, prazo: 0, recurring: false },
            pix: { enabled: true, fee: 0, prazo: 0, recurring: false },
            boleto: { enabled: true, fee: 0, prazo: 0, recurring: false },
            installment: { enabled: true, max: 12, fee: 0, prazo: 0 }
          },
          buyer: { name: true, email: true, cpf: true, phone: true, address: false },
          visual: { banner: '' },
          page: {
            blocks: [],
            settings: {
              theme: { primary:'#0ea5e9', action:'#00C853', font:'Inter' },
              security: { text:'Compra segura' },
              coupon: { enabled:false },
              timer: { enabled:false },
              orderBump: { enabled:false },
              legal: { text:'Clickify está processando este pagamento para o vendedor • Política de privacidade • Termos de serviço' },
              header: { bannerEnabled:false, bannerText:'', bannerBg:'#0ea5e9', bannerFg:'#ffffff' },
              vendor: { contactLabel:'Veja o contato do vendedor', contactUrl:'' },
              address: { enabled:false },
              custom: { pixels:'', scripts:'' }
            }
          }
        }]
      };
      localStorage.setItem('draftProductConfig', JSON.stringify(d));
    };

    document.getElementById('seedBtn').addEventListener('click', () => {
      seed();
      document.getElementById('seedBtn').textContent = 'Seed aplicado';
    });
  </script>
</body>
</html>
